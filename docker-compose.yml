services:
  zomboid:
    build: .
    image: ghcr.io/fillier/theshed-zomboid:latest
    env_file: .env
    volumes:
      - ./server:/server    # Server binaries — visible on host as ./server/
      - ./data:/data        # Player saves, config, logs — visible on host as ./data/
    ports:
      - "${SERVER_PORT:-16261}:${SERVER_PORT:-16261}/udp"
      - "${SERVER_PORT_2:-16262}:${SERVER_PORT_2:-16262}/udp"
      - "${RCON_PORT:-27015}:${RCON_PORT:-27015}/tcp"
    restart: unless-stopped
    stop_grace_period: 60s
    stdin_open: true
    tty: true
